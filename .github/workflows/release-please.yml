name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4

      - name: Build release archive
        run: mise run build:release
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GASTRO_VERSION: ${{ needs.release-please.outputs.version }}

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            tmp/release/*.tar.gz
            tmp/release/*.zip

  build-vscode:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Build universal VS Code extension
        run: |
          npm install
          npx @vscode/vsce package -o "$GITHUB_WORKSPACE/tmp/release/gastro-vscode.vsix"
        working-directory: editors/vscode

      - uses: actions/upload-artifact@v4
        with:
          name: release-vscode
          path: tmp/release/*.vsix

  publish:
    needs: [release-please, build, build-vscode]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: tmp/release
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum *.tar.gz *.zip *.vsix > SHA256SUMS
        working-directory: tmp/release

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" tmp/release/*.tar.gz tmp/release/*.zip tmp/release/*.vsix tmp/release/SHA256SUMS

      - name: Warm Go module proxy
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          echo "Warming proxy for github.com/andrioid/gastro@v${VERSION}..."
          curl -fsS "https://proxy.golang.org/github.com/andrioid/gastro/@v/v${VERSION}.info" || echo "Proxy warmup failed (non-fatal)"

      - name: Publish to VS Code Marketplace
        if: ${{ vars.VSCE_PAT != '' }}
        run: npx @vscode/vsce publish --packagePath tmp/release/*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        if: ${{ vars.OVSX_PAT != '' }}
        run: npx ovsx publish tmp/release/*.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
