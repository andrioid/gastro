name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
      - run: mise run test
      # `mise run test` only walks the root module. Sub-modules
      # (examples/* and pkg/chromalexer/*) each have their own
      # go.mod; verify discovers and tests them.
      - run: mise run verify
      # Smoke check: `go generate ./...` for the example must succeed
      # against the freshly-cloned tree (no committed static/styles.css,
      # no .gastro/). Catches missing-tool / broken-directive issues at
      # CI time rather than at first dev or deploy. No drift check
      # because every generated artifact this command produces is
      # gitignored.
      - name: Verify examples/gastro generators run clean
        working-directory: examples/gastro
        run: go generate ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
      - run: mise run lint

  check-zed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup target add wasm32-wasip1
      - run: cargo check --target wasm32-wasip1
        working-directory: editors/zed
