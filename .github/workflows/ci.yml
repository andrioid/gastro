name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
      - run: mise run test
      # `mise run test` only walks the root module. Sub-modules
      # (examples/* and pkg/chromalexer/*) each have their own
      # go.mod; verify discovers and tests them.
      - run: mise run verify
      # Drift gate for examples/gastro: runs the //go:generate
      # directives in examples/gastro/generate.go (tailwindcss build +
      # gastro generate), then fails if any committed file changed.
      # In practice this catches static/styles.css drift; .gastro/ is
      # gitignored and isn't part of the committed surface.
      - name: Verify examples/gastro is up to date
        working-directory: examples/gastro
        run: |
          go generate ./...
          git diff --exit-code

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
      - run: mise run lint

  check-zed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup target add wasm32-wasip1
      - run: cargo check --target wasm32-wasip1
        working-directory: editors/zed
