    - main [ref=e14]:
      - heading "Getting Started" [level=1] [ref=e15]
      - paragraph [ref=e16]: Set up your first Gastro project in under a minute. You'll need Go 1.26+ installed.
      - heading "Install the CLI" [level=2] [ref=e17]
      - paragraph [ref=e18]:
        - text: Build the
        - code [ref=e19]: gastro
        - text: CLI from source. If you use
        - link "mise" [ref=e20] [cursor=pointer]:
          - /url: https://mise.jdx.dev/
        - text: ", it will manage your Go toolchain automatically."
      - code [ref=e23]: "# Build the gastro CLI from source go build -o gastro ./cmd/gastro/ # Or with mise (managed tooling) mise install"
      - heading "Project Structure" [level=2] [ref=e24]
      - paragraph [ref=e25]: "A Gastro project has a simple, opinionated layout:"
      - code [ref=e28]: myapp/ pages/ index.gastro static/ styles.css main.go go.mod
      - list [ref=e29]:
        - listitem [ref=e30]:
          - strong [ref=e31]: pages/
          - text: —
          - code [ref=e32]: .gastro
          - text: files that become HTTP routes
        - listitem [ref=e33]:
          - strong [ref=e34]: components/
          - text: — reusable
          - code [ref=e35]: .gastro
          - text: components
        - listitem [ref=e36]:
          - strong [ref=e37]: static/
          - text: — CSS, images, and other static files served at
          - code [ref=e38]: /static/
        - listitem [ref=e39]:
          - strong [ref=e40]: main.go
          - text: — your application entry point
      - heading "Your First Page" [level=2] [ref=e41]
      - paragraph [ref=e42]:
        - text: Create
        - code [ref=e43]: pages/index.gastro
        - text: . The code between
        - code [ref=e44]: "---"
        - text: delimiters is Go frontmatter that runs on the server. The HTML below is rendered with Go's
        - code [ref=e45]: html/template
        - text: .
      - code [ref=e48]: "--- import \"time\" Title := \"Hello, Gastro\" Year := time.Now().Year() --- <!DOCTYPE html> <html> <head><title>{{ .Title }}</title></head> <body> <h1>{{ .Title }}</h1> <p>Copyright {{ .Year }}</p> </body> </html>"
      - paragraph [ref=e49]:
        - text: Uppercase variables like
        - code [ref=e50]: Title
        - text: and
        - code [ref=e51]: Year
        - text: are automatically exported to the template as
        - code [ref=e52]: "{{ .Title }}"
        - text: and
        - code [ref=e53]: "{{ .Year }}"
        - text: . Lowercase variables stay private.
      - heading "Entry Point" [level=2] [ref=e54]
      - paragraph [ref=e55]:
        - text: Create
        - code [ref=e56]: main.go
        - text: "that imports the generated code and starts the server:"
      - code [ref=e59]: "package main import ( \"fmt\" \"net/http\" \"os\" gastro \"myapp/.gastro\" ) func main() { port := os.Getenv(\"PORT\") if port == \"\" { port = \"4242\" } fmt.Printf(\"Listening on http://localhost:%s\\n\", port) http.ListenAndServe(\":\"+port, gastro.Routes()) }"
      - paragraph [ref=e60]:
        - text: The
        - code [ref=e61]: .gastro/
        - text: directory contains generated Go code. Import it as a package with any alias you like.
      - heading "Build & Run" [level=2] [ref=e62]
      - code [ref=e65]: "# Generate Go code from .gastro files gastro generate # Build the binary go build -o myapp . # Run ./myapp"
      - paragraph [ref=e66]:
        - text: Open
        - link "http://localhost:4242" [ref=e67] [cursor=pointer]:
          - /url: http://localhost:4242
        - text: to see your page.
      - heading "Development Mode" [level=2] [ref=e68]
      - paragraph [ref=e69]:
        - text: For development, use the
        - code [ref=e70]: gastro dev
        - text: command. It watches for file changes, regenerates code, and restarts the server automatically. Template changes are hot-reloaded without a restart.
      - code [ref=e73]: "# Watches for changes, rebuilds, restarts server gastro dev"
