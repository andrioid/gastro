    - main [ref=e30]:
      - heading "Getting Started" [level=1] [ref=e31]
      - paragraph [ref=e32]: Set up your first Gastro project in under a minute. You'll need Go 1.26+ installed.
      - heading "Install the CLI" [level=2] [ref=e33]
      - paragraph [ref=e34]:
        - text: Build the
        - code [ref=e35]: gastro
        - text: CLI from source. If you use
        - link "mise" [ref=e36] [cursor=pointer]:
          - /url: https://mise.jdx.dev/
        - text: ", it will manage your Go toolchain automatically."
      - code [ref=e39]: "# Build the gastro CLI from source go build -o gastro ./cmd/gastro/ # Or with mise (managed tooling) mise install"
      - heading "Project Structure" [level=2] [ref=e40]
      - paragraph [ref=e41]: "A Gastro project has a simple, opinionated layout:"
      - code [ref=e44]: myapp/ pages/ index.gastro static/ styles.css main.go go.mod
      - list [ref=e45]:
        - listitem [ref=e46]:
          - strong [ref=e47]: pages/
          - text: —
          - code [ref=e48]: .gastro
          - text: files that become HTTP routes
        - listitem [ref=e49]:
          - strong [ref=e50]: components/
          - text: — reusable
          - code [ref=e51]: .gastro
          - text: components
        - listitem [ref=e52]:
          - strong [ref=e53]: static/
          - text: — CSS, images, and other static files served at
          - code [ref=e54]: /static/
        - listitem [ref=e55]:
          - strong [ref=e56]: main.go
          - text: — your application entry point
      - heading "Your First Page" [level=2] [ref=e57]
      - paragraph [ref=e58]:
        - text: Create
        - code [ref=e59]: pages/index.gastro
        - text: . The code between
        - code [ref=e60]: "---"
        - text: delimiters is Go frontmatter that runs on the server. The HTML below is rendered with Go's
        - code [ref=e61]: html/template
        - text: .
      - code [ref=e64]: "--- import \"time\" Title := \"Hello, Gastro\" Year := time.Now().Year() --- <!DOCTYPE html> <html> <head><title>{{ .Title }}</title></head> <body> <h1>{{ .Title }}</h1> <p>Copyright {{ .Year }}</p> </body> </html>"
      - paragraph [ref=e65]:
        - text: Uppercase variables like
        - code [ref=e66]: Title
        - text: and
        - code [ref=e67]: Year
        - text: are automatically exported to the template as
        - code [ref=e68]: "{{ .Title }}"
        - text: and
        - code [ref=e69]: "{{ .Year }}"
        - text: . Lowercase variables stay private.
      - heading "Entry Point" [level=2] [ref=e70]
      - paragraph [ref=e71]:
        - text: Create
        - code [ref=e72]: main.go
        - text: "that imports the generated code and starts the server:"
      - code [ref=e75]: "package main import ( \"fmt\" \"net/http\" \"os\" gastro \"myapp/.gastro\" ) func main() { port := os.Getenv(\"PORT\") if port == \"\" { port = \"4242\" } fmt.Printf(\"Listening on http://localhost:%s\\n\", port) http.ListenAndServe(\":\"+port, gastro.Routes()) }"
      - paragraph [ref=e76]:
        - text: The
        - code [ref=e77]: .gastro/
        - text: directory contains generated Go code. Import it as a package with any alias you like.
      - heading "Build & Run" [level=2] [ref=e78]
      - code [ref=e81]: "# Generate Go code from .gastro files gastro generate # Build the binary go build -o myapp . # Run ./myapp"
      - paragraph [ref=e82]:
        - text: Open
        - link "http://localhost:4242" [ref=e83] [cursor=pointer]:
          - /url: http://localhost:4242
        - text: to see your page.
      - heading "Development Mode" [level=2] [ref=e84]
      - paragraph [ref=e85]:
        - text: For development, use the
        - code [ref=e86]: gastro dev
        - text: command. It watches for file changes, regenerates code, and restarts the server automatically. Template changes are hot-reloaded without a restart.
      - code [ref=e89]: "# Watches for changes, rebuilds, restarts server gastro dev"
