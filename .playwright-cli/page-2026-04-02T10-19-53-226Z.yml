      - heading "Live Demo" [level=1] [ref=e31]
      - paragraph [ref=e32]: This is a working SSE counter running on this very site. Click the button to see server-sent events in action.
      - generic [ref=e34]:
        - paragraph [ref=e35]: Server-side counter via SSE
        - generic [ref=e36]: "0"
        - button "Increment" [ref=e37] [cursor=pointer]
      - generic [ref=e38]:
        - heading "How It Works" [level=2] [ref=e39]
        - paragraph [ref=e40]:
          - text: When you click the button, Datastar sends a
          - code [ref=e41]: GET
          - text: request to
          - code [ref=e42]: /api/increment
          - text: . The server atomically increments a counter, renders the
          - code [ref=e43]: Counter
          - text: component using the type-safe
          - code [ref=e44]: Render
          - text: API, and sends an SSE event that patches the DOM.
        - heading "The SSE Handler" [level=3] [ref=e45]
        - paragraph [ref=e46]:
          - text: This Go handler runs on the server. It uses
          - code [ref=e47]: gastro.Render.Counter()
          - text: "to render the component with the new count, then sends it as a Datastar patch event:"
        - code [ref=e50]: "var count atomic.Int64 func handleIncrement(w http.ResponseWriter, r *http.Request) { n := count.Add(1) html, err := gastro.Render.Counter( gastro.CounterProps{Count: int(n)}, ) if err != nil { http.Error(w, err.Error(), 500) return } sse := datastar.NewSSE(w, r) sse.PatchElements(html) }"
        - heading "The Page" [level=3] [ref=e51]
        - paragraph [ref=e52]:
          - text: The page uses Datastar's
          - code [ref=e53]: data-on:click
          - text: "attribute to trigger the SSE request. No custom JavaScript needed:"
        - code [ref=e56]: "--- import Layout \"components/layout.gastro\" Title := \"Counter\" --- {{ wrap Layout (dict \"Title\" .Title) }} <div id=\"count\">0</div> <button data-on:click=\"@get('/api/increment')\">+1</button> {{ end }}"
        - paragraph [ref=e57]:
          - text: "This pattern works for any real-time UI: dashboards, notifications, live feeds, collaborative editing, and more. See the"
          - link "SSE & Datastar docs" [ref=e58] [cursor=pointer]:
            - /url: /docs/sse
          - text: for the full API.
