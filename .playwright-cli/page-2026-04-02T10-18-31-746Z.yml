      - heading "Slots" [level=2] [ref=e114]
      - paragraph [ref=e115]:
        - text: Slots let a component render content provided by its parent. Place
        - code [ref=e116]: <slot />
        - text: "where children should appear:"
      - code [ref=e119]: "--- type Props struct { Title string } Title := gastro.Props().Title --- <html> <head><title>{{ .Title }}</title></head> <body> <nav>...</nav> <main> {{ .Children }} </main> <footer>...</footer> </body> </html>"
      - paragraph [ref=e120]: "The parent passes children by wrapping content in the component tags:"
      - code [ref=e123]:
        - text: "{{ wrap Layout (dict \"Title\" \"Home\") }}"
        - generic [ref=e124]:
          - generic [ref=e125]: <h1
          - text: ">"
        - text: Welcome
        - generic [ref=e126]:
          - generic [ref=e127]: </h1
          - text: ">"
        - generic [ref=e128]:
          - generic [ref=e129]: <p
          - text: ">"
        - text: This replaces the slot.
        - generic [ref=e130]:
          - generic [ref=e131]: </p
          - text: ">"
        - text: "{{ end }}"
      - paragraph [ref=e132]:
        - text: Children are rendered in the
        - strong [ref=e133]: parent's
        - text: data context, so they can reference the parent's template data. Only one unnamed slot is supported per component.
