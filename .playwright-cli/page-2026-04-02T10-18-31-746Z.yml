    - main [ref=e30]:
      - heading "Components" [level=1] [ref=e31]
      - paragraph [ref=e32]:
        - text: Components are reusable
        - code [ref=e33]: .gastro
        - text: files in the
        - code [ref=e34]: components/
        - text: directory. They accept typed props and can render children via slots.
      - heading "Defining a Component" [level=2] [ref=e35]
      - paragraph [ref=e36]:
        - text: A component uses
        - code [ref=e37]: gastro.Props()
        - text: to declare its props type. The
        - code [ref=e38]: Props
        - text: "struct defines what the component accepts:"
      - code [ref=e41]: "--- type Props struct { Title string Author string } Title := gastro.Props().Title Author := gastro.Props().Author --- <article> <h2>{{ .Title }}</h2> <p>By {{ .Author }}</p> </article>"
      - paragraph [ref=e42]:
        - code [ref=e43]: gastro.Props()
        - text: is a compile-time marker that tells the code generator this file is a component. The
        - code [ref=e44]: Props
        - text: struct must be defined in the same frontmatter.
      - heading "Computed Values" [level=2] [ref=e45]
      - paragraph [ref=e46]: "When you need derived values from multiple props, assign the whole struct first:"
      - code [ref=e49]: "--- import \"fmt\" type Props struct { Label string X int } p := gastro.Props() Label := p.Label CX := fmt.Sprintf(\"%d\", p.X + 135) --- <text x=\"{{ .CX }}\">{{ .Label }}</text>"
      - heading "Importing & Using Components" [level=2] [ref=e50]
      - paragraph [ref=e51]:
        - text: Import components in the frontmatter with the
        - code [ref=e52]: .gastro
        - text: "file extension. The identifier is the local name used in the template:"
      - code [ref=e55]: "--- import ( Layout \"components/layout.gastro\" PostCard \"components/post-card.gastro\" ) ctx := gastro.Context() --- {{ wrap Layout (dict \"Title\" \"Home\") }} {{ PostCard (dict \"Title\" \"My Post\" \"Slug\" \"my-post\") }} {{ end }}"
      - heading "Prop Syntax" [level=2] [ref=e56]
      - paragraph [ref=e57]: "Props are passed as attributes on the component tag:"
      - code [ref=e60]: "<!-- Template expression --> {{ PostCard (dict \"Title\" .Title \"Slug\" .Slug) }} <!-- String literal --> {{ Layout (dict \"Title\" \"About\") }} <!-- Pipe expression --> {{ PostCard (dict \"Date\" (.CreatedAt | timeFormat \"Jan 2, 2006\")) }}"
      - table [ref=e61]:
        - rowgroup [ref=e62]:
          - row "Syntax Meaning" [ref=e63]:
