    - main [ref=e30]:
      - heading "SSE & Datastar" [level=1] [ref=e31]
      - paragraph [ref=e32]:
        - text: Gastro provides a lightweight SSE helper for streaming events from the server to the browser, enabling real-time UI updates with
        - link "Datastar" [ref=e33] [cursor=pointer]:
          - /url: https://data-star.dev/
        - text: and
        - link "HTMX" [ref=e34] [cursor=pointer]:
          - /url: https://htmx.org/
        - text: .
      - heading "How It Works" [level=2] [ref=e35]
      - list [ref=e36]:
        - listitem [ref=e37]: A Gastro page renders the initial HTML (as usual)
        - listitem [ref=e38]: Client-side attributes open an SSE connection to an API endpoint
        - listitem [ref=e39]: Your Go handler writes SSE events that patch the DOM
      - paragraph [ref=e40]:
        - text: SSE endpoints are plain Go HTTP handlers — no compiler changes needed. Register them alongside Gastro routes in your
        - code [ref=e41]: main.go
        - text: .
      - heading "Generic SSE" [level=2] [ref=e42]
      - paragraph [ref=e43]:
        - text: The core SSE helper in
        - code [ref=e44]: pkg/gastro
        - text: is framework-agnostic. It works with any client that consumes
        - code [ref=e45]: text/event-stream
        - text: ":"
      - code [ref=e48]: "func handleUpdates(w http.ResponseWriter, r *http.Request) { sse := gastro.NewSSE(w, r) ticker := time.NewTicker(1 * time.Second) defer ticker.Stop() for { select { case <-sse.Context().Done(): return case <-ticker.C: now := time.Now().Format(\"15:04:05\") sse.Send(\"time\", now) } } }"
      - paragraph [ref=e49]: "Methods available on the SSE helper:"
      - list [ref=e50]:
        - listitem [ref=e51]:
          - strong [ref=e52]:
            - code [ref=e53]: Send(eventType, data ...string)
          - text: — writes and flushes a single SSE event
        - listitem [ref=e54]:
          - strong [ref=e55]:
            - code [ref=e56]: IsClosed()
          - text: — reports whether the client disconnected
        - listitem [ref=e57]:
          - strong [ref=e58]:
            - code [ref=e59]: Context()
          - text: — returns the request context for
          - code [ref=e60]: select
          - text: loops
      - heading "Datastar Integration" [level=2] [ref=e61]
      - paragraph [ref=e62]:
        - text: The
        - code [ref=e63]: pkg/gastro/datastar
        - text: "subpackage formats events using Datastar's SSE protocol:"
      - code [ref=e66]: "var count atomic.Int64 func handleIncrement(w http.ResponseWriter, r *http.Request) { n := count.Add(1) html, err := gastro.Render.Counter( gastro.CounterProps{Count: int(n)}, ) if err != nil { http.Error(w, err.Error(), 500) return } sse := datastar.NewSSE(w, r) sse.PatchElements(html) }"
      - heading "Datastar Page" [level=3] [ref=e67]
      - paragraph [ref=e68]:
        - text: Add Datastar attributes to your
        - code [ref=e69]: .gastro
        - text: "pages to trigger SSE connections:"
      - code [ref=e72]: "--- import Layout \"components/layout.gastro\" Title := \"Counter\" --- {{ wrap Layout (dict \"Title\" .Title) }} <div id=\"count\">0</div> <button data-on:click=\"@get('/api/increment')\">+1</button> {{ end }}"
      - heading "Patch Options" [level=3] [ref=e73]
      - paragraph [ref=e74]: "Datastar supports selectors, patch modes, and signal patching:"
      - code [ref=e77]: "sse.PatchElements(html, datastar.WithSelector(\"#dashboard\"), datastar.WithMode(datastar.ModeInner), ) sse.PatchSignals(map[string]any{ \"count\": 42, \"loading\": false, }) sse.RemoveElement(\"#toast-1\")"
      - heading "Wiring It Up" [level=2] [ref=e78]
      - paragraph [ref=e79]:
        - text: Create a top-level
        - code [ref=e80]: http.ServeMux
        - text: "and mount both API routes and Gastro page routes:"
      - code [ref=e83]: "func main() { mux := http.NewServeMux() // API/SSE endpoints first mux.HandleFunc(\"GET /api/increment\", handleIncrement) mux.HandleFunc(\"GET /api/clock\", handleClock) // Gastro page routes (catch-all) mux.Handle(\"/\", gastro.Routes()) http.ListenAndServe(\":4242\", mux) }"
      - heading "Type-Safe Rendering" [level=2] [ref=e84]
      - paragraph [ref=e85]:
        - text: The compiler generates a
        - code [ref=e86]: Render
        - text: "API for calling Gastro components from SSE handlers with full type safety:"
      - code [ref=e89]: "// Each component gets a typed Render method html, err := gastro.Render.Counter( gastro.CounterProps{Count: 42}, ) // Components with slots accept optional children inner, _ := gastro.Render.Counter( gastro.CounterProps{Count: 42}, ) full, _ := gastro.Render.Layout( gastro.LayoutProps{Title: \"Dashboard\"}, template.HTML(inner), )"
