      - heading "Design Notes" [level=2] [ref=e105]
      - list [ref=e106]:
        - listitem [ref=e107]:
          - strong [ref=e108]: No external dependencies.
          - text: The SSE protocol is ~90 lines of Go.
        - listitem [ref=e109]:
          - strong [ref=e110]: Two layers.
          - text: Generic
          - code [ref=e111]: pkg/gastro
          - text: works with any SSE client.
          - code [ref=e112]: pkg/gastro/datastar
          - text: adds Datastar-specific formatting.
        - listitem [ref=e113]:
          - strong [ref=e114]: Render wraps internal functions.
          - text: Each method calls the internal component function, preserving all frontmatter logic.
