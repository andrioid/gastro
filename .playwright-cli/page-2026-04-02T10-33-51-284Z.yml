    - main [ref=e32]:
      - heading "Getting Started" [level=1] [ref=e33]
      - paragraph [ref=e34]: Set up your first Gastro project in under a minute. You'll need Go 1.26+ installed.
      - heading "Install the CLI" [level=2] [ref=e35]
      - paragraph [ref=e36]:
        - text: Build the
        - code [ref=e37]: gastro
        - text: CLI from source. If you use
        - link "mise" [ref=e38] [cursor=pointer]:
          - /url: https://mise.jdx.dev/
        - text: ", it will manage your Go toolchain automatically."
      - code [ref=e41]: "# Build the gastro CLI from source go build -o gastro ./cmd/gastro/ # Or with mise (managed tooling) mise install"
      - heading "Project Structure" [level=2] [ref=e42]
      - paragraph [ref=e43]: "A Gastro project has a simple, opinionated layout:"
      - code [ref=e46]: myapp/ pages/ index.gastro static/ styles.css main.go go.mod
      - list [ref=e47]:
        - listitem [ref=e48]:
          - strong [ref=e49]: pages/
          - text: —
          - code [ref=e50]: .gastro
          - text: files that become HTTP routes
        - listitem [ref=e51]:
          - strong [ref=e52]: components/
          - text: — reusable
          - code [ref=e53]: .gastro
          - text: components
        - listitem [ref=e54]:
          - strong [ref=e55]: static/
          - text: — CSS, images, and other static files served at
          - code [ref=e56]: /static/
        - listitem [ref=e57]:
          - strong [ref=e58]: main.go
          - text: — your application entry point
      - heading "Your First Page" [level=2] [ref=e59]
      - paragraph [ref=e60]:
        - text: Create
        - code [ref=e61]: pages/index.gastro
        - text: . The code between
        - code [ref=e62]: "---"
        - text: delimiters is Go frontmatter that runs on the server. The HTML below is rendered with Go's
        - code [ref=e63]: html/template
        - text: .
      - code [ref=e66]: "--- import \"time\" Title := \"Hello, Gastro\" Year := time.Now().Year() --- <!DOCTYPE html> <html> <head><title>{{ .Title }}</title></head> <body> <h1>{{ .Title }}</h1> <p>Copyright {{ .Year }}</p> </body> </html>"
      - paragraph [ref=e67]:
        - text: Uppercase variables like
        - code [ref=e68]: Title
        - text: and
        - code [ref=e69]: Year
        - text: are automatically exported to the template as
        - code [ref=e70]: "{{ .Title }}"
        - text: and
        - code [ref=e71]: "{{ .Year }}"
        - text: . Lowercase variables stay private.
      - heading "Entry Point" [level=2] [ref=e72]
      - paragraph [ref=e73]:
        - text: Create
        - code [ref=e74]: main.go
        - text: "that imports the generated code and starts the server:"
      - code [ref=e77]: "package main import ( \"fmt\" \"net/http\" \"os\" gastro \"myapp/.gastro\" ) func main() { port := os.Getenv(\"PORT\") if port == \"\" { port = \"4242\" } fmt.Printf(\"Listening on http://localhost:%s\\n\", port) http.ListenAndServe(\":\"+port, gastro.Routes()) }"
      - paragraph [ref=e78]:
        - text: The
        - code [ref=e79]: .gastro/
        - text: directory contains generated Go code. Import it as a package with any alias you like.
      - heading "Build & Run" [level=2] [ref=e80]
      - code [ref=e83]: "# Generate Go code from .gastro files gastro generate # Build the binary go build -o myapp . # Run ./myapp"
      - paragraph [ref=e84]:
        - text: Open
        - link "http://localhost:4242" [ref=e85] [cursor=pointer]:
          - /url: http://localhost:4242
        - text: to see your page.
      - heading "Development Mode" [level=2] [ref=e86]
      - paragraph [ref=e87]:
        - text: For development, use the
        - code [ref=e88]: gastro dev
        - text: command. It watches for file changes, regenerates code, and restarts the server automatically. Template changes are hot-reloaded without a restart.
      - code [ref=e91]: "# Watches for changes, rebuilds, restarts server gastro dev"
